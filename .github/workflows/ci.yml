name: Backend + Web CI

# Backend (Go) + web (Vite) tests, the integrated Playwright e2e, image builds, and the
# Fly deploy — one workflow because build/deploy are gated on the test jobs via `needs:`.
# Mobile has its own pipeline (mobile-ci.yml); mobile/docs/markdown-only changes don't
# touch anything here, so `paths-ignore` skips the whole run for them.
#
# Per-job filtering (the `changes` job + dorny/paths-filter): a backend-only change skips
# the web unit job, and a web-only change skips the Go + version-smoke jobs. The image-build
# and deploy jobs stay eligible regardless — they're guarded with `!failure() && !cancelled()`
# so a *skipped* (not failed) test dependency doesn't cascade into skipping the build/deploy
# gate. On main/tags every test job runs unconditionally, so filtering never weakens deploys.
on:
  push:
    branches: ['**']
    tags: ['v*']
    paths-ignore:
      - 'mobile/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'mobile/**'
      - 'docs/**'
      - '**.md'

jobs:
  # Which domains changed? Gates the fast unit-test jobs below so a backend-only PR doesn't
  # run the web suite (and vice-versa). ci.yml is in both filters so workflow edits run all.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read   # dorny/paths-filter reads the PR file list via the API
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'fly.toml'
              - 'fly/**'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'

  test:
    name: Go unit tests
    needs: changes
    # Run when backend changed, or always on main/tags (never weaken the deploy gate).
    if: >-
      needs.changes.outputs.backend == 'true' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      - run: cd backend && go mod download
      - run: cd backend && go test ./controllers/ -timeout 30s

  unit:
    name: Web unit tests
    needs: changes
    if: >-
      needs.changes.outputs.web == 'true' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run coverage   # runs the unit suite + prints a coverage report (not gated)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: web/coverage/
          retention-days: 7

  e2e:
    name: Playwright E2E
    needs: changes
    # Integration test spans both images, so run it if either domain changed.
    if: >-
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.web == 'true' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "JWT_SECRET=ci-test-secret-$(openssl rand -hex 16)" >> .env
          echo "PORT=80" >> .env

      - uses: docker/setup-buildx-action@v3

      - name: Build images with layer cache
        run: |
          docker buildx bake \
            --set "backend.cache-from=type=gha,scope=sebu-backend" \
            --set "backend.cache-to=type=gha,scope=sebu-backend,mode=max" \
            --set "frontend.cache-from=type=gha,scope=sebu-frontend" \
            --set "frontend.cache-to=type=gha,scope=sebu-frontend,mode=max" \
            --load

      - name: Start stack
        run: docker compose up -d --wait

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: cd web && npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd web && npx playwright install chromium webkit

      - name: Install Playwright system dependencies
        run: cd web && npx playwright install-deps chromium webkit

      - name: Wait for demo user to be seeded
        run: |
          timeout 90 bash -c 'until curl -sf -X POST http://localhost/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"demo@sebu.local\",\"password\":\"password123\"}" \
            | grep -q "token"; do sleep 3; done'

      - name: Run E2E tests
        run: cd web && npm run test:e2e:docker

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  version-smoke:
    name: Version injection smoke test
    needs: changes
    if: >-
      needs.changes.outputs.backend == 'true' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image with a known version
        run: docker build --build-arg VERSION=smoke-9.9.9 -t sebu-backend:smoke ./backend
      - name: Assert the binary reports the injected version
        run: |
          set -euo pipefail
          out=$(docker run --rm sebu-backend:smoke --version)
          echo "version output: $out"
          echo "$out" | grep -q 'smoke-9.9.9'

  build-backend:
    name: Build & push backend image
    needs: [test, unit, e2e, version-smoke]
    # Still verify the image builds even if a test dependency was *skipped* by filtering;
    # only a genuine failure/cancel of a dependency should stop it.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git describe --tags` resolves
      - name: Resolve version
        id: ver
        run: echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/sebu-backend
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=sebu-backend
          cache-to: type=gha,scope=sebu-backend,mode=max

  build-frontend:
    name: Build & push frontend image
    needs: [test, unit, e2e]
    if: ${{ !failure() && !cancelled() }}   # tolerate skipped (filtered) test deps; stop on real failure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/sebu-frontend
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=sebu-frontend
          cache-to: type=gha,scope=sebu-frontend,mode=max

  deploy-demo:
    name: Deploy to Fly.io
    needs: [test, unit, e2e, version-smoke]
    # main pushes run every test job (their `if` includes main), so this only deploys on a
    # clean run; the failure/cancel guard keeps a filtered skip from ever cascading here.
    if: ${{ !failure() && !cancelled() && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git describe --tags` resolves
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only --build-arg VERSION="$(git describe --tags --always)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
